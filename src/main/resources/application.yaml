spring:
  application:
    name: Cadastro

  datasource:
    url: jdbc:postgresql://localhost:5432/trilha_cadastro
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Em dev, o Hibernate cria/atualiza as tabelas. Em producao, troque para
      # 'validate' e deixe o schema sob controle exclusivo do Flyway (gerando o
      # baseline a partir do schema real). As migrations versionadas (ex.: a
      # sequence do codigoUsuario) sao sempre aplicadas pelo Flyway.
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    # Roda o data.sql (sequence) depois que o Hibernate cria as tabelas.
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always

  flyway:
    enabled: true
    baseline-on-migrate: true

  # Envio do email de confirmacao. Funciona com qualquer SMTP (Gmail, Mailtrap,
  # Brevo...). Preencha MAIL_USERNAME/MAIL_PASSWORD com as credenciais do provedor.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

camunda:
  client:
    mode: simple
    zeebe:
      gateway-address: localhost:26500
      plaintext: true

server:
  port: 8080

# traceId (correlacao de requisicoes) recebido da borda no header X-Trace-Id.
logging:
  pattern:
    level: "%5p [trace:%X{traceId:-}]"

# Login social: client-id (audience) esperado no ID token de cada provedor.
# Sem segredos aqui — a validacao usa o JWKS publico do provedor. O client-id
# do app deve bater com o aud do token, senao o token e rejeitado.
auth:
  social:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    apple:
      client-id: ${APPLE_CLIENT_ID:}

# Email de confirmacao de cadastro: remetente exibido e URL base do link que o
# usuario clica para validar a conta. Em producao, aponte confirmacao-url para a
# URL publica (BFF/front), nao para o localhost do servico.
app:
  email:
    remetente: ${MAIL_FROM:nao-responda@trilha.com}
    confirmacao-url: ${EMAIL_CONFIRMACAO_URL:http://localhost:8080/auth/confirmar-email}
  # Token de sessao emitido pela aplicacao (assinado com a chave RSA local; os
  # demais servicos validam pelo JWKS publicado em /oauth2/jwks).
  jwt:
    issuer: ${JWT_ISSUER:http://localhost:8080}
    ttl-segundos: ${JWT_TTL_SEGUNDOS:7200}
    # Producao: aponte para o PEM (PKCS#8) da chave privada RSA (ex.: segredo montado
    # pelo Kubernetes ou Secret Manager). Dev: deixe vazio para usar a chave bundled
    # em classpath:keys/dev-private-key.pem (nao e um segredo real).
    rsa-private-key-path: ${JWT_RSA_PRIVATE_KEY_PATH:}
