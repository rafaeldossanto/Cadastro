spring:
  application:
    name: Cadastro

  datasource:
    url: jdbc:postgresql://localhost:5432/trilha_cadastro
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

camunda:
  client:
    mode: simple
    zeebe:
      gateway-address: localhost:26500
      plaintext: true

server:
  port: 8080
